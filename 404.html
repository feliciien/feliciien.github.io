<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoltIQ Trade — Page not found</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --bg: #05090b;
      --ink: #f5f1e8;
      --muted: #a9b6b7;
      --gold: #f0cf78;
      --teal: #33d5cb;
      --line: rgba(240, 207, 120, .28);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at 70% 18%, rgba(240,207,120,.2), transparent 34rem),
        radial-gradient(circle at 20% 74%, rgba(51,213,203,.16), transparent 32rem),
        var(--bg);
      color: var(--ink);
    }
    main {
      width: min(620px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 36px;
      background: rgba(13, 23, 28, .78);
    }
    .mark {
      width: 52px;
      height: 52px;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(38px, 8vw, 72px);
      line-height: .95;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      border: 1px solid rgba(240,207,120,.62);
      color: var(--gold);
      border-radius: 8px;
      padding: 12px 16px;
      text-decoration: none;
      background: rgba(240,207,120,.08);
    }
  </style>
</head>
<body>
  <main>
    <img class="mark" src="/assets/boltiq-mark.svg" alt="BoltIQ Trade mark">
    <h1>Page not found.</h1>
    <p>This route is not part of the official BoltIQ Trade website. Return to the command center overview.</p>
    <a href="/">Back to BoltIQ Trade</a>
  </main>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
